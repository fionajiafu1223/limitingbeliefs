<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>限制性信念释放</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; display: block; overflow: hidden; -webkit-text-size-adjust: 100%; background:#bae6fd; }
input, select, textarea, button { font-size: 16px; }

/* ─── background — soft sky blue (same as Whole_process) ─── */
.card {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh; height: 100dvh;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
}

/* ─── question text ─── */
#questionEl {
  position: absolute; left: 0; right: 0;
  top: 13%;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 15px; letter-spacing: 1.5px;
  color: rgba(20, 60, 100, 0.92); line-height: 1.9;
  z-index: 30; opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
  padding: 0 36px;
}
#questionEl.visible { opacity: 1; }
#questionEl em {
  font-style: normal;
  color: rgba(0, 60, 110, 1);
  font-weight: 600;
}

/* ─── action buttons — at heart, tight pair ─── */
.act-btn {
  position: absolute; z-index: 30;
  padding: 11px 30px; border-radius: 99px;
  border: 1px solid rgba(70, 130, 180, 0.45);
  background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 17px;
  letter-spacing: 3px; color: rgba(20, 70, 120, 0.95);
  cursor: pointer; white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease, transform 0.2s ease, background 0.2s ease;
  transform: translate(-50%, -50%);
  top: 65%;
}
.act-btn.visible { opacity: 1; pointer-events: auto; }
.act-btn:active { transform: translate(-50%, -50%) scale(0.95); }
.act-btn:hover { background: rgba(255, 255, 255, 0.85); }

/* heart is at x=183/360 ≈ 50.8% — buttons sit at wider gap */
#btnYes    { left: calc(50.8% + 80px); }
#btnNo     { left: calc(50.8% - 80px); }
#btnCan    { left: calc(50.8% + 80px); }
#btnCannot { left: calc(50.8% - 80px); }

/* ─── ripple ─── */
.ripple-el {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 6;
  background: radial-gradient(circle, rgba(120, 180, 230, 0.55) 0%, rgba(120, 180, 230, 0) 70%);
  animation: rippleRelease 1.5s ease-out forwards;
  transform-origin: center center;
}
@keyframes rippleRelease {
  0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0.75; }
  100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
}

/* ─── heart glow ─── */
@keyframes heartPulse {
  0%,100% { opacity: 0.45; r: 56; }
  50%     { opacity: 0.85; r: 70; }
}
#svgHeartGlow { animation: heartPulse 3.5s ease-in-out infinite; }

@keyframes heartFlash {
  0%   { opacity: 0.45; r: 56; }
  30%  { opacity: 1;    r: 96; }
  100% { opacity: 0.45; r: 56; }
}
#svgHeartGlow.flash { animation: heartFlash 1.2s ease-out 1, heartPulse 3.5s ease-in-out infinite 1.2s; }

/* ─── human figure (white glow, like Whole_process) ─── */
@keyframes hg1{0%,100%{opacity:0.10}50%{opacity:0.28}}
@keyframes hg2{0%,100%{opacity:0.22}50%{opacity:0.55}}
@keyframes hg3{0%,100%{opacity:0.42}50%{opacity:0.92}}
@keyframes hcore{0%,100%{opacity:0.55}50%{opacity:1}}
.hg1{animation:hg1 6s ease-in-out infinite;}
.hg2{animation:hg2 5s ease-in-out infinite 0.5s;}
.hg3{animation:hg3 4s ease-in-out infinite 1s;}
.hcore{animation:hcore 4s ease-in-out infinite;}

/* ─── desire bubble pulsing ring ─── */
@keyframes desireRingPulse {
  0%,100% { r: 44; stroke-opacity: 0.5; }
  50%     { r: 50; stroke-opacity: 0.2; }
}
.desire-ring { animation: desireRingPulse 3s ease-in-out infinite; }

/* ─── bottom bar ─── */
#bottomBar {
  position: absolute;
  bottom: max(36px, env(safe-area-inset-bottom, 36px));
  left: 50%; transform: translateX(-50%);
  z-index: 30; display: flex; align-items: center; gap: 14px;
  white-space: nowrap;
}
.bottom-text {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  letter-spacing: 2px; color: rgba(20, 70, 120, 0.6);
}
.bottom-btn {
  padding: 7px 16px; border-radius: 99px;
  border: 1px solid rgba(70, 130, 180, 0.3);
  background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  letter-spacing: 2px; color: rgba(20, 70, 120, 0.75);
  cursor: pointer; transition: background 0.2s ease;
}
.bottom-btn:hover { background: rgba(255, 255, 255, 0.75); }
.bottom-btn:active { transform: scale(0.96); }

/* ═════════════════════════════════════════════════════════
   HOME PAGE — floating glass bubbles (sky blue theme)
   ═════════════════════════════════════════════════════════ */
.home-page {
  position: absolute; inset: 0; z-index: 50;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
  overflow: hidden;
  transition: opacity 0.5s ease;
}
.home-page.hidden { opacity: 0; pointer-events: none; }

.home-title {
  position: absolute; top: 70px; left: 0; right: 0;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 22px;
  letter-spacing: 8px; color: rgba(15, 60, 110, 0.9);
  z-index: 5; pointer-events: none;
}

.glass-bubble {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL XiaoWei', serif;
  letter-spacing: 2px;
  color: rgba(15, 60, 110, 0.95);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.2s ease;
  transform: translate(-50%, -50%);
}
.glass-bubble:active { transform: translate(-50%, -50%) scale(0.94); }

@keyframes bob {
  0%, 100% { translate: 0 0; }
  50%      { translate: 0 -10px; }
}
.glass-bubble.bob {
  animation: bob var(--bob-dur, 4s) ease-in-out infinite;
  animation-delay: var(--bob-delay, 0s);
}

#loadingOverlay {
  position: absolute; inset: 0; z-index: 60;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 14px;
  letter-spacing: 3px; color: rgba(15, 60, 110, 0.7);
  transition: opacity 0.4s ease;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- ═══════════════ HOME PAGE ═══════════════ -->
<div class="home-page" id="homePage">
  <div class="home-title">限制性信念释放</div>
  <div id="bubblesContainer"></div>
</div>

<!-- ═══════════════ CARD / RELEASE PAGE ═══════════════ -->
<div class="card" id="card">
  <div id="questionEl"></div>

  <svg id="sv" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:5;pointer-events:none;" viewBox="0 0 360 640">
    <defs id="svgDefs">
      <filter id="f1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10"/></filter>
      <filter id="f2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="20"/></filter>
      <filter id="f3" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="36"/></filter>
      <filter id="fd"  x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="9"/></filter>
      <radialGradient id="heartGradient" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(255,255,255,1)" stop-opacity="0.95"/>
        <stop offset="40%"  stop-color="rgba(255,255,255,1)" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="rgba(255,255,255,1)" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Human figure (white glow like Whole_process) -->
    <path class="hg1" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f3)"/>
    <path class="hg2" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f2)"/>
    <path class="hg3" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f1)"/>
    <path class="hcore" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- heart energy glow (chest center) -->
    <circle id="svgHeartGlow" cx="183" cy="420" r="60"
      fill="url(#heartGradient)" opacity="0.85"/>

    <!-- bubbles layer (desire orbs go here) -->
    <g id="bubblesLayer"></g>
  </svg>

  <button class="act-btn" id="btnYes">是</button>
  <button class="act-btn" id="btnNo">否</button>
  <button class="act-btn" id="btnCan">能</button>
  <button class="act-btn" id="btnCannot">不能</button>

  <div id="bottomBar">
    <button class="bottom-btn" id="backBtn">← 返回</button>
    <span class="bottom-text" id="counterText">今日 0</span>
  </div>
</div>

<div id="loadingOverlay">加载中…</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';

// Three desires — matching Whole_process palette + positions
const DESIRES = {
  control: {
    name: '想要控制',
    glow: '#b84040', stroke: '#ffcca0',
    s: ['#ffcca0','#c05030','#7a2010'],
    bodyPos: { x: 123, y: 370 }   // chest-left
  },
  approval: {
    name: '想要被认同',
    glow: '#9050b0', stroke: '#e0b8ff',
    s: ['#e0b8ff','#9050b0','#5a1880'],
    bodyPos: { x: 243, y: 370 }   // chest-right
  },
  safety: {
    name: '想要安全',
    glow: '#2080a0', stroke: '#a0e0ff',
    s: ['#a0e0ff','#2080a0','#0a4860'],
    bodyPos: { x: 183, y: 455 }   // belly-center
  }
};

// Head target position (where the chosen orb floats up to)
const HEAD_X = 183, HEAD_Y = 165;

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let BELIEFS = null;
let CURRENT_QUEUE = [];
let QUEUE_INDEX = 0;
let CURRENT_Q = null;
let PHASE = 'question'; // 'question' | 'release'
let CURRENT_CATEGORY = 'all';
let desireBubbles = {}; // { control: el, approval: el, safety: el }
let gradientCounter = 0;

// ═══════════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY = 'lb_progress_v1';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultProgress();
    const p = JSON.parse(raw);
    const today = new Date().toDateString();
    if (p.todayDate !== today) {
      p.todayCount = 0;
      p.todayDate = today;
    }
    return p;
  } catch(e) { return defaultProgress(); }
}
function defaultProgress() {
  return { total: 0, todayCount: 0, todayDate: new Date().toDateString(), byCategory: {}, byDesire: {} };
}
function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e){}
}
function incrementProgress(question) {
  const p = loadProgress();
  p.total += 1;
  p.todayCount += 1;
  p.todayDate = new Date().toDateString();
  p.byCategory[question.category] = (p.byCategory[question.category] || 0) + 1;
  p.byDesire[question.desire] = (p.byDesire[question.desire] || 0) + 1;
  saveProgress(p);
  updateCounter();
}

// ═══════════════════════════════════════════════════════════
//  LOAD BELIEFS
// ═══════════════════════════════════════════════════════════
async function loadBeliefs() {
  try {
    const res = await fetch('beliefs.json');
    if (!res.ok) throw new Error('fetch failed');
    BELIEFS = await res.json();
    document.getElementById('loadingOverlay').classList.add('hidden');
    initHomePage();
  } catch(e) {
    document.getElementById('loadingOverlay').innerHTML
      = '题库加载失败<br><small style="font-size:11px;">请检查 beliefs.json 是否就位</small>';
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════
//  HOME PAGE
// ═══════════════════════════════════════════════════════════
function initHomePage() {
  const container = document.getElementById('bubblesContainer');
  container.innerHTML = '';

  const SIZE_RAND = 130;
  const SIZE_CAT  = 100;

  const bubbles = [
    { id: 'all',       label: '随机',     size: SIZE_RAND, x: 50, y: 40, dur: 4.0, delay: 0.0 },
    { id: 'money',     label: '金钱',     size: SIZE_CAT,  x: 22, y: 22, dur: 4.5, delay: 0.4 },
    { id: 'relations', label: '关系',     size: SIZE_CAT,  x: 78, y: 22, dur: 3.8, delay: 0.9 },
    { id: 'career',    label: '事业',     size: SIZE_CAT,  x: 18, y: 58, dur: 4.2, delay: 0.2 },
    { id: 'health',    label: '健康',     size: SIZE_CAT,  x: 82, y: 58, dur: 3.6, delay: 1.1 },
    { id: 'self',      label: '自我价值', size: SIZE_CAT,  x: 32, y: 80, dur: 4.7, delay: 0.7 },
    { id: 'family',    label: '原生家庭', size: SIZE_CAT,  x: 68, y: 80, dur: 4.1, delay: 0.3 }
  ];

  bubbles.forEach(b => {
    const el = document.createElement('div');
    el.className = 'glass-bubble bob';
    el.style.left = b.x + '%';
    el.style.top  = b.y + '%';
    el.style.width  = b.size + 'px';
    el.style.height = b.size + 'px';
    el.style.fontSize = (b.size >= 120 ? 18 : 14) + 'px';
    el.style.setProperty('--bob-dur', b.dur + 's');
    el.style.setProperty('--bob-delay', b.delay + 's');
    el.textContent = b.label;
    applyGlassBubbleStyle(el);
    el.onclick = () => startSession(b.id);
    container.appendChild(el);
  });
}

function applyGlassBubbleStyle(el) {
  el.style.background = [
    'radial-gradient(circle at 32% 28%,',
    '  rgba(255,255,255,0.8) 0%,',
    '  rgba(220,240,255,0.5) 22%,',
    '  rgba(140,200,240,0.32) 50%,',
    '  rgba(100,170,220,0.22) 75%,',
    '  rgba(80,150,210,0.10) 100%)'
  ].join('');
  el.style.boxShadow = [
    'inset 0 0 35px rgba(140,200,240,0.6)',
    'inset 0 0 14px rgba(100,170,220,0.5)',
    '0 4px 22px rgba(100,170,220,0.55)',
    '0 0 32px rgba(140,200,240,0.32)'
  ].join(', ');
  el.style.border = 'none';
}

// ═══════════════════════════════════════════════════════════
//  SESSION
// ═══════════════════════════════════════════════════════════
function startSession(categoryId) {
  CURRENT_CATEGORY = categoryId;
  let pool = (categoryId === 'all')
    ? BELIEFS.questions.slice()
    : BELIEFS.questions.filter(q => q.category === categoryId);
  CURRENT_QUEUE = shuffle(pool);
  QUEUE_INDEX = 0;
  document.getElementById('homePage').classList.add('hidden');
  updateCounter();
  showNextQuestion();
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showNextQuestion() {
  if (QUEUE_INDEX >= CURRENT_QUEUE.length) {
    CURRENT_QUEUE = shuffle(CURRENT_QUEUE);
    QUEUE_INDEX = 0;
  }
  CURRENT_Q = CURRENT_QUEUE[QUEUE_INDEX];
  PHASE = 'question';
  hideBtn('btnCan');
  hideBtn('btnCannot');

  // clear any leftover desire bubbles
  clearDesireBubbles();

  // spawn all 3 desire bubbles in the body with staggered fade-in
  spawnAllDesires();

  // show question text
  const qEl = document.getElementById('questionEl');
  qEl.textContent = CURRENT_Q.question;
  setTimeout(() => {
    showEl('questionEl');
    setTimeout(() => {
      showBtn('btnYes');
      showBtn('btnNo');
    }, 400);
  }, 200);
}

// ═══════════════════════════════════════════════════════════
//  DESIRE BUBBLES (SVG, matching Whole_process style)
// ═══════════════════════════════════════════════════════════
function spawnAllDesires() {
  ['control', 'approval', 'safety'].forEach((key, i) => {
    setTimeout(() => {
      spawnDesireBubble(key);
    }, i * 280);
  });
}

function spawnDesireBubble(key) {
  const d = DESIRES[key];
  const layer = document.getElementById('bubblesLayer');
  const defs = document.getElementById('svgDefs');

  // gradient
  const gid = 'grad_' + (gradientCounter++);
  const rg = document.createElementNS(NS, 'radialGradient');
  rg.setAttribute('id', gid);
  rg.setAttribute('cx','38%'); rg.setAttribute('cy','32%'); rg.setAttribute('r','65%');
  const stops = [
    [d.s[0], 0.95, '0%'],
    [d.s[1], 0.78, '55%'],
    [d.s[2], 0.68, '100%']
  ];
  stops.forEach(([c, op, off]) => {
    const st = document.createElementNS(NS,'stop');
    st.setAttribute('offset', off);
    st.setAttribute('stop-color', c);
    st.setAttribute('stop-opacity', op);
    rg.appendChild(st);
  });
  defs.appendChild(rg);

  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${d.bodyPos.x},${d.bodyPos.y})`);
  g.style.opacity = '0';
  g.style.transition = 'opacity 0.8s ease, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1)';

  // pulsing ring
  const ring = document.createElementNS(NS, 'circle');
  ring.setAttribute('r', 44);
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', d.stroke);
  ring.setAttribute('stroke-width', '1.2');
  ring.setAttribute('stroke-opacity', '0.5');
  ring.classList.add('desire-ring');

  // outer glow
  const glC = document.createElementNS(NS, 'circle');
  glC.setAttribute('r', 46);
  glC.setAttribute('fill', d.glow);
  glC.setAttribute('filter', 'url(#fd)');
  glC.style.opacity = '0.35';

  // body
  const bod = document.createElementNS(NS, 'circle');
  bod.setAttribute('r', 40);
  bod.setAttribute('fill', `url(#${gid})`);

  // rim
  const rim = document.createElementNS(NS, 'circle');
  rim.setAttribute('r', 40);
  rim.setAttribute('fill', 'none');
  rim.setAttribute('stroke', d.stroke);
  rim.setAttribute('stroke-width', '1.4');
  rim.setAttribute('stroke-opacity', '0.9');

  // sparkle dots
  [-10, 10].forEach(dx => {
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('r', '2');
    dot.setAttribute('cx', dx);
    dot.setAttribute('cy', '-8');
    dot.setAttribute('fill', 'white');
    dot.setAttribute('fill-opacity', '0.35');
    g.appendChild(dot);
  });

  // highlight
  const h1 = document.createElementNS(NS, 'ellipse');
  h1.setAttribute('rx', '12');
  h1.setAttribute('ry', '6');
  h1.setAttribute('fill', 'white');
  h1.setAttribute('fill-opacity', '0.28');
  h1.setAttribute('transform', 'translate(-10,-13)');

  // label
  const tx = document.createElementNS(NS, 'text');
  tx.setAttribute('text-anchor', 'middle');
  tx.setAttribute('dy', '0.35em');
  tx.setAttribute('font-size', '9');
  tx.setAttribute('font-family', "'Noto Serif SC',serif");
  tx.setAttribute('fill', 'white');
  tx.setAttribute('fill-opacity', '0.92');
  tx.textContent = d.name;

  [ring, glC, bod, rim, h1, tx].forEach(el => g.appendChild(el));
  layer.appendChild(g);

  // fade in
  requestAnimationFrame(() => { g.style.opacity = '1'; });

  desireBubbles[key] = { el: g, gid, key };
}

function clearDesireBubbles() {
  const layer = document.getElementById('bubblesLayer');
  layer.innerHTML = '';
  desireBubbles = {};
}

// ═══════════════════════════════════════════════════════════
//  ANSWER: 否
// ═══════════════════════════════════════════════════════════
function onAnswerNo() {
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideEl('questionEl');
  // fade out all desire bubbles
  fadeOutAllDesires();
  setTimeout(() => {
    QUEUE_INDEX += 1;
    showNextQuestion();
  }, 600);
}

function fadeOutAllDesires() {
  Object.values(desireBubbles).forEach(b => {
    b.el.style.opacity = '0';
  });
}

// ═══════════════════════════════════════════════════════════
//  ANSWER: 是 → release phase
// ═══════════════════════════════════════════════════════════
function onAnswerYes() {
  flashHeart();
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideEl('questionEl');
  PHASE = 'release';

  const chosenKey = CURRENT_Q.desire;

  // fade out the two non-chosen bubbles
  Object.keys(desireBubbles).forEach(key => {
    if (key !== chosenKey) {
      desireBubbles[key].el.style.opacity = '0';
    }
  });

  // float chosen bubble up to head
  setTimeout(() => {
    const chosen = desireBubbles[chosenKey];
    if (chosen) {
      chosen.el.setAttribute('transform', `translate(${HEAD_X},${HEAD_Y})`);
    }

    // show release question (above head)
    setTimeout(() => {
      const qEl = document.getElementById('questionEl');
      const desireName = DESIRES[chosenKey].name;
      qEl.innerHTML = `你能允许这个<em>${desireName}</em>离开吗？`;
      showEl('questionEl');
      setTimeout(() => {
        showBtn('btnCan');
        showBtn('btnCannot');
      }, 400);
    }, 700);
  }, 300);
}

// ═══════════════════════════════════════════════════════════
//  RELEASE: 能 / 不能 — both float bubble away
// ═══════════════════════════════════════════════════════════
function onCanRelease()    { completeRelease(); }
function onCannotRelease() { completeRelease(); }

function completeRelease() {
  hideBtn('btnCan');
  hideBtn('btnCannot');
  hideEl('questionEl');
  triggerRipple();

  // float chosen bubble away (up and out)
  const chosenKey = CURRENT_Q.desire;
  const chosen = desireBubbles[chosenKey];
  if (chosen) {
    chosen.el.style.transition = 'opacity 1.2s ease-out, transform 1.4s cubic-bezier(0.4, 0, 0.6, 1)';
    chosen.el.setAttribute('transform', `translate(${HEAD_X},${HEAD_Y - 250})`);
    setTimeout(() => { chosen.el.style.opacity = '0'; }, 100);
  }

  incrementProgress(CURRENT_Q);

  setTimeout(() => {
    QUEUE_INDEX += 1;
    showNextQuestion();
  }, 1500);
}

// ═══════════════════════════════════════════════════════════
//  VISUAL EFFECTS
// ═══════════════════════════════════════════════════════════
function flashHeart() {
  const h = document.getElementById('svgHeartGlow');
  h.classList.remove('flash');
  void h.offsetWidth;
  h.classList.add('flash');
}

function getHeartScreenPos() {
  const svg = document.getElementById('sv');
  const rect = svg.getBoundingClientRect();
  return {
    x: rect.left + (183 / 360) * rect.width,
    y: rect.top  + (420 / 640) * rect.height
  };
}

function triggerRipple() {
  const card = document.getElementById('card');
  const p = getHeartScreenPos();
  for (let i = 0; i < 2; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'ripple-el';
      r.style.left = p.x + 'px';
      r.style.top  = p.y + 'px';
      r.style.width = '120px';
      r.style.height = '120px';
      card.appendChild(r);
      setTimeout(() => r.remove(), 1600);
    }, i * 200);
  }
}

// ═══════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function showEl(id) { document.getElementById(id).classList.add('visible'); }
function hideEl(id) { document.getElementById(id).classList.remove('visible'); }
function showBtn(id) { document.getElementById(id).classList.add('visible'); }
function hideBtn(id) { document.getElementById(id).classList.remove('visible'); }

function updateCounter() {
  const p = loadProgress();
  document.getElementById('counterText').textContent = '今日 ' + p.todayCount;
}

function returnHome() {
  document.getElementById('homePage').classList.remove('hidden');
  hideEl('questionEl');
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideBtn('btnCan');
  hideBtn('btnCannot');
  clearDesireBubbles();
}

document.getElementById('btnYes').addEventListener('click', onAnswerYes);
document.getElementById('btnNo').addEventListener('click', onAnswerNo);
document.getElementById('btnCan').addEventListener('click', onCanRelease);
document.getElementById('btnCannot').addEventListener('click', onCannotRelease);
document.getElementById('backBtn').addEventListener('click', returnHome);

loadBeliefs();
</script>
