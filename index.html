<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>限制性信念释放</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; display: block; overflow: hidden; -webkit-text-size-adjust: 100%; background:#bae6fd; }
input, select, textarea, button { font-size: 16px; }

/* ─── background — soft sky blue (same as Whole_process) ─── */
.card {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh; height: 100dvh;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
}

/* ─── inner page header ─── */
.app-title {
  position: absolute; top: 28px; left: 0; right: 0;
  text-align: center; z-index: 10; pointer-events: none;
}
.app-title h1 {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 14px;
  letter-spacing: 5px; color: rgba(15, 60, 110, 0.75); font-weight: 400;
}
.app-title p {
  font-size: 9px; letter-spacing: 3px;
  color: rgba(15, 60, 110, 0.45); margin-top: 4px;
}

/* ─── question text ─── */
#questionEl {
  position: absolute; left: 0; right: 0;
  top: 13%;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 15px; letter-spacing: 1.5px;
  color: rgba(20, 60, 100, 0.92); line-height: 1.9;
  z-index: 30; opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
  padding: 0 36px;
}
#questionEl.visible { opacity: 1; }
#questionEl em {
  font-style: normal;
  color: rgba(0, 60, 110, 1);
  font-weight: 600;
}

/* ─── action buttons — at heart, tight pair ─── */
.act-btn {
  position: absolute; z-index: 30;
  padding: 11px 30px; border-radius: 99px;
  border: 1px solid rgba(70, 130, 180, 0.45);
  background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 17px;
  letter-spacing: 3px; color: rgba(20, 70, 120, 0.95);
  cursor: pointer; white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease, transform 0.2s ease, background 0.2s ease;
  transform: translate(-50%, -50%);
  top: 65%;
}
.act-btn.visible { opacity: 1; pointer-events: auto; }
.act-btn:active { transform: translate(-50%, -50%) scale(0.95); }
.act-btn:hover { background: rgba(255, 255, 255, 0.85); }

/* heart is at x=183/360 ≈ 50.8% — buttons sit at moderate gap */
#btnYes    { left: calc(50.8% + 60px); }
#btnNo     { left: calc(50.8% - 60px); }
#btnCan    { left: calc(50.8% + 60px); }
#btnCannot { left: calc(50.8% - 60px); }

/* ─── ripple ─── */
.ripple-el {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 6;
  background: radial-gradient(circle, rgba(120, 180, 230, 0.55) 0%, rgba(120, 180, 230, 0) 70%);
  animation: rippleRelease 1.5s ease-out forwards;
  transform-origin: center center;
}
@keyframes rippleRelease {
  0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0.75; }
  100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
}

/* ─── heart glow ─── */
/* heart in normal state — breathes softly */
@keyframes heartPulse {
  0%,100% { opacity: 0.45; r: 56; }
  50%     { opacity: 0.85; r: 70; }
}
#svgHeartGlow { animation: heartPulse 3.5s ease-in-out infinite; }

/* heart "condensed" state — after user answers "是" — bigger, more solid */
@keyframes heartCondensed {
  0%,100% { opacity: 0.85; r: 78; }
  50%     { opacity: 1;    r: 92; }
}
#svgHeartGlow.condensed { animation: heartCondensed 2.4s ease-in-out infinite; }

/* strong heartbeat — happens at key moments */
@keyframes heartBoom {
  0%   { opacity: 0.45; r: 60; }
  18%  { opacity: 1;    r: 140; }
  50%  { opacity: 0.7;  r: 90; }
  100% { opacity: 0.85; r: 78; }
}
#svgHeartGlow.boom { animation: heartBoom 1.6s cubic-bezier(0.16, 1, 0.3, 1) 1; }

/* release boom — final release, energy dissipates */
@keyframes heartRelease {
  0%   { opacity: 0.95; r: 80; }
  20%  { opacity: 1;    r: 160; }
  60%  { opacity: 0.5;  r: 100; }
  100% { opacity: 0.45; r: 60; }
}
#svgHeartGlow.release { animation: heartRelease 1.8s cubic-bezier(0.16, 1, 0.3, 1) 1, heartPulse 3.5s ease-in-out infinite 1.8s; }

/* ─── human figure (white glow, like Whole_process) ─── */
@keyframes hg1{0%,100%{opacity:0.10}50%{opacity:0.28}}
@keyframes hg2{0%,100%{opacity:0.22}50%{opacity:0.55}}
@keyframes hg3{0%,100%{opacity:0.42}50%{opacity:0.92}}
@keyframes hcore{0%,100%{opacity:0.55}50%{opacity:1}}
.hg1{animation:hg1 6s ease-in-out infinite;}
.hg2{animation:hg2 5s ease-in-out infinite 0.5s;}
.hg3{animation:hg3 4s ease-in-out infinite 1s;}
.hcore{animation:hcore 4s ease-in-out infinite;}

/* ─── desire bubble pulsing ring ─── */
@keyframes desireRingPulse {
  0%,100% { r: 44; stroke-opacity: 0.5; }
  50%     { r: 50; stroke-opacity: 0.2; }
}
.desire-ring { animation: desireRingPulse 3s ease-in-out infinite; }

/* ─── bottom bar ─── */
#bottomBar {
  position: absolute;
  bottom: max(36px, env(safe-area-inset-bottom, 36px));
  left: 50%; transform: translateX(-50%);
  z-index: 30; display: flex; align-items: center; gap: 14px;
  white-space: nowrap;
}
.bottom-text {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  letter-spacing: 2px; color: rgba(20, 70, 120, 0.6);
}
.bottom-btn {
  padding: 7px 16px; border-radius: 99px;
  border: 1px solid rgba(70, 130, 180, 0.3);
  background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  letter-spacing: 2px; color: rgba(20, 70, 120, 0.75);
  cursor: pointer; transition: background 0.2s ease;
}
.bottom-btn:hover { background: rgba(255, 255, 255, 0.75); }
.bottom-btn:active { transform: scale(0.96); }

/* ═════════════════════════════════════════════════════════
   HOME PAGE — floating glass bubbles (sky blue theme)
   ═════════════════════════════════════════════════════════ */
.home-page {
  position: absolute; inset: 0; z-index: 50;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
  overflow: hidden;
  transition: opacity 0.5s ease;
}
.home-page.hidden { opacity: 0; pointer-events: none; }

.home-title {
  position: absolute; top: 56px; left: 0; right: 0;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 22px;
  letter-spacing: 8px; color: rgba(15, 60, 110, 0.9);
  z-index: 5; pointer-events: none;
}
.home-stats {
  position: absolute;
  bottom: max(36px, env(safe-area-inset-bottom, 36px));
  left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 18px;
  z-index: 5; pointer-events: none;
  font-family: 'ZCOOL XiaoWei', serif;
  color: rgba(15, 60, 110, 0.7);
}
.stat-cell { display: flex; align-items: baseline; gap: 6px; }
.stat-num  { font-size: 18px; color: rgba(15, 60, 110, 0.95); letter-spacing: 1px; }
.stat-label{ font-size: 11px; letter-spacing: 3px; color: rgba(15, 60, 110, 0.55); }
.stat-divider {
  width: 1px; height: 14px;
  background: rgba(15, 60, 110, 0.25);
}

.glass-bubble {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL XiaoWei', serif;
  letter-spacing: 2px;
  color: rgba(15, 60, 110, 0.95);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.2s ease;
  transform: translate(-50%, -50%);
}
.glass-bubble:active { transform: translate(-50%, -50%) scale(0.94); }

@keyframes bob {
  0%, 100% { translate: 0 0; }
  50%      { translate: 0 -10px; }
}
.glass-bubble.bob {
  animation: bob var(--bob-dur, 4s) ease-in-out infinite;
  animation-delay: var(--bob-delay, 0s);
}

#loadingOverlay {
  position: absolute; inset: 0; z-index: 60;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 14px;
  letter-spacing: 3px; color: rgba(15, 60, 110, 0.7);
  transition: opacity 0.4s ease;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- ═══════════════ HOME PAGE ═══════════════ -->
<div class="home-page" id="homePage">
  <div class="home-title">限制性信念释放</div>
  <div id="bubblesContainer"></div>
  <div class="home-stats" id="homeStats">
    <span class="stat-cell"><span class="stat-num" id="homeStatToday">0</span><span class="stat-label">今日</span></span>
    <span class="stat-divider"></span>
    <span class="stat-cell"><span class="stat-num" id="homeStatTotal">0</span><span class="stat-label">累计</span></span>
  </div>
</div>

<!-- ═══════════════ CARD / RELEASE PAGE ═══════════════ -->
<div class="card" id="card">
  <div class="app-title">
    <h1>限制性信念释放</h1>
    <p>觉察 · 允许 · 释放</p>
  </div>
  <div id="questionEl"></div>

  <svg id="sv" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:5;pointer-events:none;" viewBox="0 0 360 640">
    <defs id="svgDefs">
      <filter id="f1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10"/></filter>

      <radialGradient id="heartGradient" cx="50%" cy="50%" r="50%">

      </radialGradient>
      <!-- desire-themed energy gradients (used after "yes") -->

      </radialGradient>
    </defs>

    <!-- Human figure (white glow like Whole_process) -->
    <path class="hg1" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f3)"/>
    <path class="hg2" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f2)"/>
    <path class="hg3" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f1)"/>
    <path class="hcore" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- heart energy glow (chest center) -->
    <circle id="svgHeartGlow" cx="183" cy="420" r="60"
      fill="url(#heartGradient)" opacity="0.85"/>
  </svg>

  <button class="act-btn" id="btnYes">是</button>
  <button class="act-btn" id="btnNo">否</button>
  <button class="act-btn" id="btnCan">能</button>
  <button class="act-btn" id="btnCannot">不能</button>

  <div id="bottomBar">
    <button class="bottom-btn" id="backBtn">← 返回</button>
    <span class="bottom-text" id="counterText">今日 0</span>
  </div>
</div>

<div id="loadingOverlay">加载中…</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';

// Three desires — matching Whole_process palette + positions
const DESIRES = {
  control: {
    name: '想要控制',
    glow: '#b84040', stroke: '#ffcca0',
    s: ['#ffcca0','#c05030','#7a2010'],
    bodyPos: { x: 123, y: 370 }   // chest-left
  },
  approval: {
    name: '想要被认同',
    glow: '#9050b0', stroke: '#e0b8ff',
    s: ['#e0b8ff','#9050b0','#5a1880'],
    bodyPos: { x: 243, y: 370 }   // chest-right
  },
  safety: {
    name: '想要安全',
    glow: '#2080a0', stroke: '#a0e0ff',
    s: ['#a0e0ff','#2080a0','#0a4860'],
    bodyPos: { x: 183, y: 455 }   // belly-center
  }
};

// Head target position (where the chosen orb floats up to)
const HEAD_X = 183, HEAD_Y = 205;

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let BELIEFS = null;
let CURRENT_QUEUE = [];
let QUEUE_INDEX = 0;
let CURRENT_Q = null;
let PHASE = 'question'; // 'question' | 'release'
let CURRENT_CATEGORY = 'all';

// ═══════════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY = 'lb_progress_v1';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultProgress();
    const p = JSON.parse(raw);
    const today = new Date().toDateString();
    if (p.todayDate !== today) {
      p.todayCount = 0;
      p.todayDate = today;
    }
    return p;
  } catch(e) { return defaultProgress(); }
}
function defaultProgress() {
  return { total: 0, todayCount: 0, todayDate: new Date().toDateString(), byCategory: {}, byDesire: {} };
}
function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e){}
}
function incrementProgress(question) {
  const p = loadProgress();
  p.total += 1;
  p.todayCount += 1;
  p.todayDate = new Date().toDateString();
  p.byCategory[question.category] = (p.byCategory[question.category] || 0) + 1;
  p.byDesire[question.desire] = (p.byDesire[question.desire] || 0) + 1;
  saveProgress(p);
  updateCounter();
}

// ═══════════════════════════════════════════════════════════
//  LOAD BELIEFS
// ═══════════════════════════════════════════════════════════
async function loadBeliefs() {
  try {
    const res = await fetch('beliefs.json');
    if (!res.ok) throw new Error('fetch failed');
    BELIEFS = await res.json();
    document.getElementById('loadingOverlay').classList.add('hidden');
    initHomePage();
  } catch(e) {
    document.getElementById('loadingOverlay').innerHTML
      = '题库加载失败<br><small style="font-size:11px;">请检查 beliefs.json 是否就位</small>';
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════
//  HOME PAGE
// ═══════════════════════════════════════════════════════════
function initHomePage() {
  const container = document.getElementById('bubblesContainer');
  container.innerHTML = '';
  updateHomeStats();

  const SIZE_RAND = 130;
  const SIZE_CAT  = 100;

  // each bubble has its own glow color — matching the FREED ecosystem palette
  const bubbles = [
    // top: random (large, centered)
    { id: 'all',       label: '随机',     glow: 'rgba(255,255,255,0.55)',   size: SIZE_RAND, x: 50, y: 24, dur: 4.0, delay: 0.0 },
    // 2 columns × 3 rows
    { id: 'money',     label: '金钱',     glow: 'rgba(225,195,80,0.55)',    size: SIZE_CAT,  x: 32, y: 44, dur: 4.5, delay: 0.4 },
    { id: 'relations', label: '关系',     glow: 'rgba(255,130,155,0.55)',   size: SIZE_CAT,  x: 68, y: 44, dur: 3.8, delay: 0.9 },
    { id: 'career',    label: '事业',     glow: 'rgba(60,110,200,0.55)',    size: SIZE_CAT,  x: 32, y: 64, dur: 4.2, delay: 0.2 },
    { id: 'health',    label: '健康',     glow: 'rgba(40,190,140,0.55)',    size: SIZE_CAT,  x: 68, y: 64, dur: 3.6, delay: 1.1 },
    { id: 'self',      label: '自我价值', glow: 'rgba(190,140,255,0.50)',   size: SIZE_CAT,  x: 32, y: 84, dur: 4.7, delay: 0.7 },
    { id: 'family',    label: '原生家庭', glow: 'rgba(165,115,75,0.55)',    size: SIZE_CAT,  x: 68, y: 84, dur: 4.1, delay: 0.3 }
  ];

  bubbles.forEach(b => {
    const el = document.createElement('div');
    el.className = 'glass-bubble bob';
    el.style.left = b.x + '%';
    el.style.top  = b.y + '%';
    el.style.width  = b.size + 'px';
    el.style.height = b.size + 'px';
    el.style.fontSize = (b.size >= 120 ? 18 : 14) + 'px';
    el.style.setProperty('--bob-dur', b.dur + 's');
    el.style.setProperty('--bob-delay', b.delay + 's');
    el.textContent = b.label;
    applyGlassBubbleStyle(el, b.glow);
    el.onclick = () => startSession(b.id);
    container.appendChild(el);
  });
}

function applyGlassBubbleStyle(el, glow) {
  // base alpha used in glow rgba (we replace it to derive different intensities)
  // same pattern as index.html setNavBubbleColors()
  const baseAlpha = '0.55';
  const a30 = glow.replace(baseAlpha, '0.30');
  const a22 = glow.replace(baseAlpha, '0.22');
  const a10 = glow.replace(baseAlpha, '0.10');
  const a75 = glow.replace(baseAlpha, '0.75');
  const a65 = glow.replace(baseAlpha, '0.65');
  const a80 = glow.replace(baseAlpha, '0.80');
  const a45 = glow.replace(baseAlpha, '0.45');

  el.style.background = [
    'radial-gradient(circle at 32% 28%,',
    '  rgba(255,255,255,0.78) 0%,',
    '  rgba(245,245,250,0.45) 22%,',
    '  ' + a30 + ' 50%,',
    '  ' + a22 + ' 75%,',
    '  ' + a10 + ' 100%)'
  ].join('');
  el.style.boxShadow = [
    'inset 0 0 35px ' + a75,
    'inset 0 0 14px ' + a65,
    '0 4px 22px ' + a80,
    '0 0 32px ' + a45
  ].join(', ');
  el.style.border = 'none';
}

// ═══════════════════════════════════════════════════════════
//  SESSION
// ═══════════════════════════════════════════════════════════
function startSession(categoryId) {
  CURRENT_CATEGORY = categoryId;
  let pool = (categoryId === 'all')
    ? BELIEFS.questions.slice()
    : BELIEFS.questions.filter(q => q.category === categoryId);
  CURRENT_QUEUE = shuffle(pool);
  QUEUE_INDEX = 0;
  document.getElementById('homePage').classList.add('hidden');
  updateCounter();
  showNextQuestion();
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showNextQuestion() {
  if (QUEUE_INDEX >= CURRENT_QUEUE.length) {
    CURRENT_QUEUE = shuffle(CURRENT_QUEUE);
    QUEUE_INDEX = 0;
  }
  CURRENT_Q = CURRENT_QUEUE[QUEUE_INDEX];
  PHASE = 'question';
  hideBtn('btnCan');
  hideBtn('btnCannot');

  // show question text
  const qEl = document.getElementById('questionEl');
  qEl.textContent = CURRENT_Q.question;
  setTimeout(() => {
    showEl('questionEl');
    setTimeout(() => {
      showBtn('btnYes');
      showBtn('btnNo');
    }, 400);
  }, 200);
}

// ═══════════════════════════════════════════════════════════
//  (desire bubbles removed — replaced by intense heart pulse "boom")

// ═══════════════════════════════════════════════════════════
//  ANSWER: 否
// ═══════════════════════════════════════════════════════════
function onAnswerNo() {
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideEl('questionEl');
  setHeartNormal();
  resetHeartColor();
  setTimeout(() => {
    QUEUE_INDEX += 1;
    showNextQuestion();
  }, 500);
}

// ═══════════════════════════════════════════════════════════
//  ANSWER: 是 → release phase
// ═══════════════════════════════════════════════════════════
function onAnswerYes() {
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideEl('questionEl');
  PHASE = 'release';

  // 1. boom the heart
  boomHeart();

  // 2. transition the heart to "condensed" colored state mid-boom
  setTimeout(() => {
    setHeartColor(CURRENT_Q.desire);
    setHeartCondensed();
  }, 700);

  // 3. show release question (above head)
  setTimeout(() => {
    const qEl = document.getElementById('questionEl');
    const desireName = DESIRES[CURRENT_Q.desire].name;
    qEl.innerHTML = `你能允许这种<em>${desireName}</em>离开吗？`;
    showEl('questionEl');
    setTimeout(() => {
      showBtn('btnCan');
      showBtn('btnCannot');
    }, 400);
  }, 1100);
}

function setHeartColor(desireKey) {
  const h = document.getElementById('svgHeartGlow');
  const map = {
    control:  'heartGradient_control',
    approval: 'heartGradient_approval',
    safety:   'heartGradient_safety'
  };
  h.setAttribute('fill', `url(#${map[desireKey]})`);
}

function resetHeartColor() {
  const h = document.getElementById('svgHeartGlow');
  h.setAttribute('fill', 'url(#heartGradient)');
}

function setHeartCondensed() {
  const h = document.getElementById('svgHeartGlow');
  h.classList.remove('boom');
  h.classList.remove('release');
  h.classList.add('condensed');
}

function setHeartNormal() {
  const h = document.getElementById('svgHeartGlow');
  h.classList.remove('condensed');
  h.classList.remove('boom');
  h.classList.remove('release');
}

// ═══════════════════════════════════════════════════════════
//  RELEASE: 能 / 不能 — both float bubble away
// ═══════════════════════════════════════════════════════════
function onCanRelease()    { completeRelease(); }
function onCannotRelease() { completeRelease(); }

function completeRelease() {
  hideBtn('btnCan');
  hideBtn('btnCannot');
  hideEl('questionEl');

  // release animation
  releaseHeart();
  triggerRipple();

  incrementProgress(CURRENT_Q);

  // after release, reset color back to white for next question
  setTimeout(() => {
    resetHeartColor();
    setHeartNormal();
  }, 1800);

  setTimeout(() => {
    QUEUE_INDEX += 1;
    showNextQuestion();
  }, 1800);
}

function releaseHeart() {
  const h = document.getElementById('svgHeartGlow');
  h.classList.remove('condensed');
  h.classList.remove('boom');
  h.classList.remove('release');
  void h.offsetWidth;
  h.classList.add('release');
}

// ═══════════════════════════════════════════════════════════
//  VISUAL EFFECTS
// ═══════════════════════════════════════════════════════════
function boomHeart() {
  const h = document.getElementById('svgHeartGlow');
  h.classList.remove('boom');
  void h.offsetWidth;
  h.classList.add('boom');
}

function getHeartScreenPos() {
  const svg = document.getElementById('sv');
  const rect = svg.getBoundingClientRect();
  return {
    x: rect.left + (183 / 360) * rect.width,
    y: rect.top  + (420 / 640) * rect.height
  };
}

function triggerRipple() {
  const card = document.getElementById('card');
  const p = getHeartScreenPos();
  for (let i = 0; i < 2; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'ripple-el';
      r.style.left = p.x + 'px';
      r.style.top  = p.y + 'px';
      r.style.width = '120px';
      r.style.height = '120px';
      card.appendChild(r);
      setTimeout(() => r.remove(), 1600);
    }, i * 200);
  }
}

// ═══════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function showEl(id) { document.getElementById(id).classList.add('visible'); }
function hideEl(id) { document.getElementById(id).classList.remove('visible'); }
function showBtn(id) { document.getElementById(id).classList.add('visible'); }
function hideBtn(id) { document.getElementById(id).classList.remove('visible'); }

function updateCounter() {
  const p = loadProgress();
  document.getElementById('counterText').textContent = '今日 ' + p.todayCount;
}

function updateHomeStats() {
  const p = loadProgress();
  document.getElementById('homeStatToday').textContent = p.todayCount;
  document.getElementById('homeStatTotal').textContent = p.total;
}

function returnHome() {
  document.getElementById('homePage').classList.remove('hidden');
  updateHomeStats();
  hideEl('questionEl');
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideBtn('btnCan');
  hideBtn('btnCannot');
}

document.getElementById('btnYes').addEventListener('click', onAnswerYes);
document.getElementById('btnNo').addEventListener('click', onAnswerNo);
document.getElementById('btnCan').addEventListener('click', onCanRelease);
document.getElementById('btnCannot').addEventListener('click', onCannotRelease);
document.getElementById('backBtn').addEventListener('click', returnHome);

loadBeliefs();
</script>
</body>
</html>
