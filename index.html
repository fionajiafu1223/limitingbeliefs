<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>限制性信念释放</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; display: block; overflow: hidden; -webkit-text-size-adjust: 100%; }
input, select, textarea, button { font-size: 16px; }

/* ─── background — soft lavender ─── */
.card {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh; height: 100dvh;
  background: linear-gradient(170deg, #f7f3fc 0%, #ece1f5 45%, #d8c5ea 100%);
}

/* ─── question text (top area) ─── */
#questionEl {
  position: absolute; left: 0; right: 0;
  top: 16%;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 15px; letter-spacing: 1.5px;
  color: rgba(85, 50, 130, 0.88); line-height: 1.9;
  z-index: 30; opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
  padding: 0 36px;
}
#questionEl.visible { opacity: 1; }

/* ─── action buttons — placed AT heart, larger ─── */
.act-btn {
  position: absolute; z-index: 30;
  padding: 11px 30px; border-radius: 99px;
  border: 1px solid rgba(160, 120, 200, 0.45);
  background: rgba(255, 252, 255, 0.7); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 17px;
  letter-spacing: 3px; color: rgba(95, 55, 145, 0.95);
  cursor: pointer; white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease, transform 0.2s ease, background 0.2s ease;
  transform: translate(-50%, -50%);
  top: 59%;
}
.act-btn.visible { opacity: 1; pointer-events: auto; }
.act-btn:active { transform: translate(-50%, -50%) scale(0.95); }
.act-btn:hover { background: rgba(240, 225, 250, 0.85); }

#btnYes    { left: 64%; }
#btnNo     { left: 37%; }
#btnCan    { left: 64%; }
#btnCannot { left: 37%; }

/* ─── ripple element ─── */
.ripple-el {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 6;
  background: radial-gradient(circle, rgba(180, 130, 220, 0.55) 0%, rgba(180, 130, 220, 0) 70%);
  animation: rippleRelease 1.5s ease-out forwards;
  transform-origin: center center;
}
@keyframes rippleRelease {
  0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0.75; }
  100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
}

/* ─── heart glow animation ─── */
@keyframes heartPulse {
  0%,100% { opacity: 0.45; r: 56; }
  50%     { opacity: 0.85; r: 70; }
}
#svgHeartGlow { animation: heartPulse 3.5s ease-in-out infinite; }

@keyframes heartFlash {
  0%   { opacity: 0.45; r: 56; }
  30%  { opacity: 1;    r: 96; }
  100% { opacity: 0.45; r: 56; }
}
#svgHeartGlow.flash { animation: heartFlash 1.2s ease-out 1, heartPulse 3.5s ease-in-out infinite 1.2s; }

/* ─── human figure layered glow ─── */
@keyframes hg1{0%,100%{opacity:0.08}50%{opacity:0.22}}
@keyframes hg2{0%,100%{opacity:0.18}50%{opacity:0.5}}
@keyframes hg3{0%,100%{opacity:0.38}50%{opacity:0.85}}
@keyframes hcore{0%,100%{opacity:0.5}50%{opacity:1}}
.hg1{animation:hg1 6s ease-in-out infinite;}
.hg2{animation:hg2 5s ease-in-out infinite 0.5s;}
.hg3{animation:hg3 4s ease-in-out infinite 1s;}
.hcore{animation:hcore 4s ease-in-out infinite;}

/* ─── desire orb ─── */
.desire-orb {
  position: absolute;
  width: 130px; height: 130px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 14px; letter-spacing: 2.5px;
  white-space: pre-line; text-align: center; line-height: 1.5;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.4);
  transition: opacity 0.7s ease, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1), top 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}
.desire-orb.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.desire-orb.float-away {
  opacity: 0;
  transform: translate(-50%, -150%) scale(0.6);
  transition: opacity 1.4s ease-out, transform 1.6s cubic-bezier(0.4, 0, 0.6, 1);
}

.desire-orb.d-control {
  background: radial-gradient(circle at 32% 28%,
    rgba(255, 220, 200, 0.95) 0%,
    rgba(255, 204, 160, 0.78) 30%,
    rgba(192, 80, 48, 0.55) 70%,
    rgba(122, 32, 16, 0.42) 100%);
  color: #4a1408;
  box-shadow:
    inset 0 0 30px rgba(255, 200, 160, 0.7),
    0 0 40px rgba(184, 64, 64, 0.45),
    0 0 80px rgba(184, 64, 64, 0.25);
  border: 1.5px solid rgba(255, 220, 180, 0.7);
}
.desire-orb.d-approval {
  background: radial-gradient(circle at 32% 28%,
    rgba(240, 220, 255, 0.95) 0%,
    rgba(224, 184, 255, 0.78) 30%,
    rgba(144, 80, 176, 0.55) 70%,
    rgba(90, 24, 128, 0.42) 100%);
  color: #2d0848;
  box-shadow:
    inset 0 0 30px rgba(230, 195, 255, 0.7),
    0 0 40px rgba(144, 80, 176, 0.45),
    0 0 80px rgba(144, 80, 176, 0.25);
  border: 1.5px solid rgba(230, 200, 255, 0.7);
}
.desire-orb.d-safety {
  background: radial-gradient(circle at 32% 28%,
    rgba(210, 240, 255, 0.95) 0%,
    rgba(160, 224, 255, 0.78) 30%,
    rgba(32, 128, 160, 0.55) 70%,
    rgba(10, 72, 96, 0.42) 100%);
  color: #042438;
  box-shadow:
    inset 0 0 30px rgba(180, 230, 255, 0.7),
    0 0 40px rgba(32, 128, 160, 0.45),
    0 0 80px rgba(32, 128, 160, 0.25);
  border: 1.5px solid rgba(200, 235, 255, 0.7);
}

/* ─── bottom bar ─── */
#bottomBar {
  position: absolute;
  bottom: max(36px, env(safe-area-inset-bottom, 36px));
  left: 50%; transform: translateX(-50%);
  z-index: 30; display: flex; align-items: center; gap: 14px;
  white-space: nowrap;
}
.bottom-text {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  letter-spacing: 2px; color: rgba(110, 70, 160, 0.55);
}
.bottom-btn {
  padding: 7px 16px; border-radius: 99px;
  border: 1px solid rgba(160, 120, 200, 0.3);
  background: rgba(255, 252, 255, 0.5); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  letter-spacing: 2px; color: rgba(110, 70, 160, 0.75);
  cursor: pointer; transition: background 0.2s ease;
}
.bottom-btn:hover { background: rgba(240, 225, 250, 0.75); }
.bottom-btn:active { transform: scale(0.96); }

/* ═════════════════════════════════════════════════════════
   HOME PAGE — floating glass bubbles
   ═════════════════════════════════════════════════════════ */
.home-page {
  position: absolute; inset: 0; z-index: 50;
  background: linear-gradient(170deg, #f7f3fc 0%, #ece1f5 45%, #d8c5ea 100%);
  overflow: hidden;
  transition: opacity 0.5s ease;
}
.home-page.hidden { opacity: 0; pointer-events: none; }

.home-title {
  position: absolute; top: 70px; left: 0; right: 0;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 22px;
  letter-spacing: 8px; color: rgba(85, 50, 130, 0.85);
  z-index: 5; pointer-events: none;
}

.glass-bubble {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL XiaoWei', serif;
  letter-spacing: 2px;
  color: rgba(70, 35, 120, 0.95);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.2s ease;
  transform: translate(-50%, -50%);
}
.glass-bubble:active { transform: translate(-50%, -50%) scale(0.94); }

@keyframes bob {
  0%, 100% { translate: 0 0; }
  50%      { translate: 0 -10px; }
}
.glass-bubble.bob {
  animation: bob var(--bob-dur, 4s) ease-in-out infinite;
  animation-delay: var(--bob-delay, 0s);
}

/* loading */
#loadingOverlay {
  position: absolute; inset: 0; z-index: 60;
  background: linear-gradient(170deg, #f7f3fc 0%, #ece1f5 45%, #d8c5ea 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 14px;
  letter-spacing: 3px; color: rgba(95, 60, 130, 0.7);
  transition: opacity 0.4s ease;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- ═══════════════ HOME PAGE ═══════════════ -->
<div class="home-page" id="homePage">
  <div class="home-title">限制性信念释放</div>
  <div id="bubblesContainer"></div>
</div>

<!-- ═══════════════ CARD / RELEASE PAGE ═══════════════ -->
<div class="card" id="card">
  <div id="questionEl"></div>

  <svg id="sv" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:5;pointer-events:none;" viewBox="0 0 360 640">
    <defs>
      <filter id="f1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10"/></filter>
      <filter id="f2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="20"/></filter>
      <filter id="f3" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="36"/></filter>
      <radialGradient id="heartGradient" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(180,130,220,1)" stop-opacity="0.9"/>
        <stop offset="40%"  stop-color="rgba(160,110,210,1)" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="rgba(160,110,210,1)" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <path class="hg1" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#c8a8eb" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f3)"/>
    <path class="hg2" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#d8c5ea" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f2)"/>
    <path class="hg3" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#f3e8fa" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f1)"/>
    <path class="hcore" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <circle id="svgHeartGlow" cx="183" cy="380" r="60"
      fill="url(#heartGradient)" opacity="0.85"/>
  </svg>

  <div id="desireOrb" class="desire-orb"></div>

  <button class="act-btn" id="btnYes">是</button>
  <button class="act-btn" id="btnNo">否</button>
  <button class="act-btn" id="btnCan">能</button>
  <button class="act-btn" id="btnCannot">不能</button>

  <div id="bottomBar">
    <button class="bottom-btn" id="backBtn">← 返回</button>
    <span class="bottom-text" id="counterText">今日 0</span>
  </div>
</div>

<div id="loadingOverlay">加载中…</div>

<script>
let BELIEFS = null;
let CURRENT_QUEUE = [];
let QUEUE_INDEX = 0;
let CURRENT_Q = null;
let PHASE = 'question';
let CURRENT_CATEGORY = 'all';

const STORAGE_KEY = 'lb_progress_v1';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultProgress();
    const p = JSON.parse(raw);
    const today = new Date().toDateString();
    if (p.todayDate !== today) {
      p.todayCount = 0;
      p.todayDate = today;
    }
    return p;
  } catch(e) { return defaultProgress(); }
}
function defaultProgress() {
  return { total: 0, todayCount: 0, todayDate: new Date().toDateString(), byCategory: {}, byDesire: {} };
}
function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e){}
}
function incrementProgress(question) {
  const p = loadProgress();
  p.total += 1;
  p.todayCount += 1;
  p.todayDate = new Date().toDateString();
  p.byCategory[question.category] = (p.byCategory[question.category] || 0) + 1;
  p.byDesire[question.desire] = (p.byDesire[question.desire] || 0) + 1;
  saveProgress(p);
  updateCounter();
}

const DESIRE_LABELS = {
  control:  '想要\n控制',
  approval: '想要被\n认同',
  safety:   '想要\n安全'
};
const DESIRE_CLASSES = {
  control:  'd-control',
  approval: 'd-approval',
  safety:   'd-safety'
};

async function loadBeliefs() {
  try {
    const res = await fetch('beliefs.json');
    if (!res.ok) throw new Error('fetch failed');
    BELIEFS = await res.json();
    document.getElementById('loadingOverlay').classList.add('hidden');
    initHomePage();
  } catch(e) {
    document.getElementById('loadingOverlay').innerHTML
      = '题库加载失败<br><small style="font-size:11px;">请检查 beliefs.json 是否就位</small>';
    console.error(e);
  }
}

function initHomePage() {
  const container = document.getElementById('bubblesContainer');
  container.innerHTML = '';

  const SIZE_RAND = 130;
  const SIZE_CAT  = 100;

  const bubbles = [
    { id: 'all',       label: '随机',     size: SIZE_RAND, x: 50, y: 40, dur: 4.0, delay: 0.0 },
    { id: 'money',     label: '金钱',     size: SIZE_CAT,  x: 22, y: 22, dur: 4.5, delay: 0.4 },
    { id: 'relations', label: '关系',     size: SIZE_CAT,  x: 78, y: 22, dur: 3.8, delay: 0.9 },
    { id: 'career',    label: '事业',     size: SIZE_CAT,  x: 18, y: 58, dur: 4.2, delay: 0.2 },
    { id: 'health',    label: '健康',     size: SIZE_CAT,  x: 82, y: 58, dur: 3.6, delay: 1.1 },
    { id: 'self',      label: '自我价值', size: SIZE_CAT,  x: 32, y: 80, dur: 4.7, delay: 0.7 },
    { id: 'family',    label: '原生家庭', size: SIZE_CAT,  x: 68, y: 80, dur: 4.1, delay: 0.3 }
  ];

  bubbles.forEach(b => {
    const el = document.createElement('div');
    el.className = 'glass-bubble bob';
    el.style.left = b.x + '%';
    el.style.top  = b.y + '%';
    el.style.width  = b.size + 'px';
    el.style.height = b.size + 'px';
    el.style.fontSize = (b.size >= 120 ? 18 : 14) + 'px';
    el.style.setProperty('--bob-dur', b.dur + 's');
    el.style.setProperty('--bob-delay', b.delay + 's');
    el.textContent = b.label;
    applyGlassBubbleStyle(el);
    el.onclick = () => startSession(b.id);
    container.appendChild(el);
  });
}

function applyGlassBubbleStyle(el) {
  el.style.background = [
    'radial-gradient(circle at 32% 28%,',
    '  rgba(255,255,255,0.75) 0%,',
    '  rgba(245,235,255,0.45) 22%,',
    '  rgba(190,150,230,0.30) 50%,',
    '  rgba(170,120,210,0.22) 75%,',
    '  rgba(150,100,200,0.10) 100%)'
  ].join('');
  el.style.boxShadow = [
    'inset 0 0 35px rgba(190,150,230,0.55)',
    'inset 0 0 14px rgba(170,120,210,0.45)',
    '0 4px 22px rgba(170,120,210,0.55)',
    '0 0 32px rgba(190,150,230,0.30)'
  ].join(', ');
  el.style.border = 'none';
}

function startSession(categoryId) {
  CURRENT_CATEGORY = categoryId;
  let pool = (categoryId === 'all')
    ? BELIEFS.questions.slice()
    : BELIEFS.questions.filter(q => q.category === categoryId);
  CURRENT_QUEUE = shuffle(pool);
  QUEUE_INDEX = 0;
  document.getElementById('homePage').classList.add('hidden');
  updateCounter();
  showNextQuestion();
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showNextQuestion() {
  // infinite loop
  if (QUEUE_INDEX >= CURRENT_QUEUE.length) {
    CURRENT_QUEUE = shuffle(CURRENT_QUEUE);
    QUEUE_INDEX = 0;
  }
  CURRENT_Q = CURRENT_QUEUE[QUEUE_INDEX];
  PHASE = 'question';
  hideBtn('btnCan');
  hideBtn('btnCannot');
  resetDesireOrb();

  const qEl = document.getElementById('questionEl');
  qEl.textContent = CURRENT_Q.question;
  setTimeout(() => {
    showEl('questionEl');
    setTimeout(() => {
      showBtn('btnYes');
      showBtn('btnNo');
    }, 400);
  }, 100);
}

function onAnswerNo() {
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideEl('questionEl');
  setTimeout(() => {
    QUEUE_INDEX += 1;
    showNextQuestion();
  }, 500);
}

function onAnswerYes() {
  flashHeart();
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideEl('questionEl');
  PHASE = 'release';
  setTimeout(() => {
    spawnDesireOrb();
    setTimeout(() => {
      showBtn('btnCan');
      showBtn('btnCannot');
    }, 900);
  }, 600);
}

function spawnDesireOrb() {
  const orb = document.getElementById('desireOrb');
  const cls = DESIRE_CLASSES[CURRENT_Q.desire];
  const label = DESIRE_LABELS[CURRENT_Q.desire];

  orb.className = 'desire-orb';
  orb.textContent = label;
  orb.classList.add(cls);

  // start position: at heart
  const heartPos = getHeartScreenPos();
  orb.style.left = heartPos.x + 'px';
  orb.style.top  = heartPos.y + 'px';

  void orb.offsetWidth;

  // animate up to floating position (above heart)
  orb.classList.add('visible');
  const targetY = window.innerHeight * 0.32;
  setTimeout(() => {
    orb.style.top = targetY + 'px';
  }, 50);
}

function resetDesireOrb() {
  const orb = document.getElementById('desireOrb');
  orb.className = 'desire-orb';
  orb.style.opacity = '';
  orb.style.transform = '';
}

function floatOrbAway() {
  const orb = document.getElementById('desireOrb');
  orb.classList.add('float-away');
}

function onCanRelease()    { completeRelease(); }
function onCannotRelease() { completeRelease(); }

function completeRelease() {
  hideBtn('btnCan');
  hideBtn('btnCannot');
  triggerRipple();
  floatOrbAway();
  incrementProgress(CURRENT_Q);
  setTimeout(() => {
    QUEUE_INDEX += 1;
    showNextQuestion();
  }, 1500);
}

function flashHeart() {
  const h = document.getElementById('svgHeartGlow');
  h.classList.remove('flash');
  void h.offsetWidth;
  h.classList.add('flash');
}

function getHeartScreenPos() {
  const svg = document.getElementById('sv');
  const rect = svg.getBoundingClientRect();
  return {
    x: rect.left + (183 / 360) * rect.width,
    y: rect.top  + (380 / 640) * rect.height
  };
}

function triggerRipple() {
  const card = document.getElementById('card');
  const p = getHeartScreenPos();
  for (let i = 0; i < 2; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'ripple-el';
      r.style.left = p.x + 'px';
      r.style.top  = p.y + 'px';
      r.style.width = '120px';
      r.style.height = '120px';
      card.appendChild(r);
      setTimeout(() => r.remove(), 1600);
    }, i * 200);
  }
}

function showEl(id) { document.getElementById(id).classList.add('visible'); }
function hideEl(id) { document.getElementById(id).classList.remove('visible'); }
function showBtn(id) { document.getElementById(id).classList.add('visible'); }
function hideBtn(id) { document.getElementById(id).classList.remove('visible'); }

function updateCounter() {
  const p = loadProgress();
  document.getElementById('counterText').textContent = '今日 ' + p.todayCount;
}

function returnHome() {
  document.getElementById('homePage').classList.remove('hidden');
  hideEl('questionEl');
  hideBtn('btnYes');
  hideBtn('btnNo');
  hideBtn('btnCan');
  hideBtn('btnCannot');
  resetDesireOrb();
}

document.getElementById('btnYes').addEventListener('click', onAnswerYes);
document.getElementById('btnNo').addEventListener('click', onAnswerNo);
document.getElementById('btnCan').addEventListener('click', onCanRelease);
document.getElementById('btnCannot').addEventListener('click', onCannotRelease);
document.getElementById('backBtn').addEventListener('click', returnHome);

loadBeliefs();
</script>
</body>
</html>
